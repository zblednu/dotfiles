

[env]
TERM = "xterm-256color"

[font]
size = 18.0

[window]
padding = { x = 4, y = 4 }
dynamic_padding = true
option_as_alt = "Both"
decorations = "None"
startup_mode = "Maximized"

[scrolling]
history = 10000

[keyboard]
[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

[general]
live_config_reload = true

[font.normal]
family = "MesloLGS Nerd Font"
style = "Regular"

[font.bold]
family = "MesloLGS Nerd Font"
style = "Bold"

[font.italic]
family = "MesloLGS Nerd Font"
style = "Italic"
