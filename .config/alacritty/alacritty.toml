[env]
TERM = "xterm-256color"

[window]
option_as_alt = "Both"
decorations = "None"
startup_mode = "Maximized"
dynamic_padding = true

[general]
live_config_reload = true

[font]
size = 16.0

[font.normal]
family = "MesloLGS Nerd Font"
style = "Regular"

[font.bold]
family = "MesloLGS Nerd Font"
style = "Bold"

[font.italic]
family = "MesloLGS Nerd Font"
style = "Italic"

# for claude code
[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
